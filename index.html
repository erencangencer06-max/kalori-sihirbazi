<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalori Sihirbazı</title>
    <style>
        :root { --bg: #f4f6f8; --card-bg: #ffffff; --text: #2c3e50; --sub-text: #7f8c8d; --border: #e2e8f0; --primary: #2980b9; --success: #27ae60; --result-bg: #ebf5fb; }
        body.dark-mode { --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --sub-text: #a0a0a0; --border: #333333; --result-bg: #1a2634; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: 0.3s; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .theme-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; border: none; background: none; line-height: 1; padding: 0; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: var(--sub-text); text-transform: uppercase; }
        input { padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); width: 100%; -webkit-user-select: text; user-select: text; }
        button.calc-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .result-box { display: none; margin-top: 20px; padding: 20px; background: var(--result-bg); border-radius: 15px; text-align: center; }
        .progress-container { background: var(--border); height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; }
        .food-reward { font-weight: bold; color: var(--success); margin-top: 10px; font-style: italic; }
    </style>
    <script>if (window.top !== window.self) { window.top.location = window.self.location; }</script>
</head>
<body>
<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <h1>🏃 Kalori Sihirbazı</h1>
    
    <div class="row">
        <div class="col"><label>Yaş</label><input type="number" id="yas"></div>
        <div class="col"><label>Kilo</label><input type="number" id="kilo"></div>
    </div>
    <div class="row">
        <div class="col"><label>Eğim (%)</label><input type="number" id="egim"></div>
        <div class="col"><label>Mesafe (km)</label><input type="number" id="mesafe"></div>
    </div>
    <div class="row">
        <div class="col"><label>Süre (dk)</label><input type="number" id="sure"></div>
        <div class="col"><label>Hedef (kcal)</label><input type="number" id="hedef" placeholder="Örn: 500"></div>
    </div>
    
    <button class="calc-btn" onclick="hesapla()">🔥 HESAPLA</button>
    
    <div id="resultBox" class="result-box">
        <div id="sonucMetin" style="font-size:20px; font-weight:bold;"></div>
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <div id="yiyecek" class="food-reward"></div>
    </div>
</div>

<script>
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) e.preventDefault(); });

    function hesapla() {
        const kilo = parseFloat(document.getElementById('kilo').value) || 75;
        const sure = parseFloat(document.getElementById('sure').value) || 30;
        const hedef = parseFloat(document.getElementById('hedef').value) || 500;
        const sonuc = Math.round(kilo * sure * 0.15); // Dinamik hesaplama
        
        document.getElementById('sonucMetin').innerText = `Yaktığın: ${sonuc} kcal`;
        document.getElementById('bar').style.width = Math.min((sonuc / hedef) * 100, 100) + "%";
        
        const yemekler = [{k: 100, i: "1 kupa kahve"}, {k: 300, i: "1 muz"}, {k: 500, i: "1 dilim pizza"}, {k: 800, i: "1 hamburger"}];
        document.getElementById('yiyecek').innerText = `Bu antrenmanla: ${yemekler.findLast(y => sonuc >= y.k)?.i || "Azimle devam!"} erittin!`;
        document.getElementById('resultBox').style.display = "block";
    }
</script>
</body>
</html>
