<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalori Sihirbazı</title>
    <style>
        :root {
            --bg: #f4f6f8; --card-bg: #ffffff; --text: #2c3e50;
            --sub-text: #7f8c8d; --border: #e2e8f0; --input-bg: #fdfdfd;
            --primary: #2980b9; --primary-hover: #2171a3; --success: #27ae60;
            --result-bg: #ebf5fb; --result-border: #d4e6f1;
        }
        body.dark-mode {
            --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0;
            --sub-text: #a0a0a0; --border: #333333; --input-bg: #2a2a2a;
            --result-bg: #1a2634; --result-border: #2c3e50;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--bg); color: var(--text); padding: min(5vw, 30px); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background-color 0.3s ease; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 480px; padding: clamp(15px, 5vw, 30px); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--border); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; flex-shrink: 0; transition: background-color 0.3s ease; line-height: 1; padding: 0; overflow: hidden; }
        h1 { text-align: center; font-size: clamp(20px, 6vw, 24px); font-weight: 800; margin-bottom: 6px; }
        p.subtitle { text-align: center; font-size: clamp(12px, 3.5vw, 14px); color: var(--sub-text); margin-bottom: 25px; font-style: italic; }
        h2 { font-size: clamp(14px, 4.5vw, 16px); margin: 20px 0 12px 0; border-bottom: 2px solid var(--border); padding-bottom: 6px; font-weight: 700; color: var(--text); }
        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; min-width: 160px; display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--sub-text); text-transform: uppercase; }
        input { padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; width: 100%; outline: none; background: var(--input-bg); color: var(--text); -webkit-user-select: text; user-select: text; }
        .radio-group { display: flex; gap: 15px; padding: 6px 0; }
        .radio-group label { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; cursor: pointer; }
        button.calc-btn { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .result-box { display: none; margin-top: 25px; background: var(--result-bg); border: 2px solid var(--result-border); border-radius: 12px; padding: 20px; text-align: center; }
        .result-title { color: var(--success); font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        .metrics { display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-top: 12px; font-size: 14px; color: var(--sub-text); margin-bottom: 15px; }
        .metric-val { font-weight: 700; color: var(--text); }
        .progress-container { background: var(--border); height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: width 0.5s ease; }
        .food-reward { font-size: 14px; font-weight: bold; color: var(--success); margin-top: 10px; font-style: italic; }
    </style>
    <script>
        if (window.top !== window.self) { window.top.location = window.self.location; }
    </script>
</head>
<body>
<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" title="Temayı Değiştir">🌓</button>
    <h1>🏃 Kalori Sihirbazı</h1>
    <p class="subtitle">Laboratuvar tipi gelişmiş kalori hesaplama sistemi</p>
    
    <h2>👤 Profil & Hedef</h2>
    <div class="row">
        <div class="col">
            <label>Cinsiyet</label>
            <div class="radio-group">
                <label><input type="radio" name="cinsiyet" value="e" checked> Erkek</label>
                <label><input type="radio" name="cinsiyet" value="k"> Kadın</label>
            </div>
        </div>
        <div class="col"><label>Yaşınız</label><input type="number" id="yas"></div>
    </div>
    <div class="row">
        <div class="col"><label>Kilonuz (kg)</label><input type="number" id="kilo"></div>
        <div class="col"><label>Hedef (kcal)</label><input type="number" id="hedef" placeholder="Örn: 500"></div>
    </div>
    <h2>📊 Antrenman Değerleri</h2>
    <div class="row">
        <div class="col"><label>Mesafe (km)</label><input type="number" id="mesafe" step="0.01"></div>
        <div class="col"><label>Süre (dk)</label><input type="number" id="sure"></div>
    </div>
    <div class="col"><label>Eğim (%)</label><input type="number" id="egim" step="0.1"></div>

    <button class="calc-btn" onclick="kaloriHesapla()">🔥 KALORİYİ HESAPLA</button>
    
    <div id="resultBox" class="result-box">
        <div id="kaloriSonuc" class="result-title"></div>
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <div id="yiyecek" class="food-reward"></div>
        <div class="metrics">
            <div>Hız: <span id="hizSonuc" class="metric-val"></span></div>
            <div>Tür: <span id="turSonuc" class="metric-val"></span></div>
        </div>
    </div>
</div>

<script>
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) e.preventDefault(); });

    function kaloriHesapla() {
        const cinsiyet = document.querySelector('input[name="cinsiyet"]:checked').value;
        const yas = parseInt(document.getElementById('yas').value);
        const kilo = parseFloat(document.getElementById('kilo').value);
        const egim = parseFloat(document.getElementById('egim').value);
        const mesafe = parseFloat(document.getElementById('mesafe').value);
        const sure = parseFloat(document.getElementById('sure').value);
        const hedef = parseFloat(document.getElementById('hedef').value) || 500;
        
        if(isNaN(yas) || isNaN(kilo) || isNaN(egim) || isNaN(mesafe) || isNaN(sure)) { alert("Lütfen tüm alanları doldurun kral!"); return; }
        
        const hizKmSa = mesafe / (sure / 60);
        const netKalori = Math.round((kilo * sure * 0.15) + (egim * 0.5)); 
        
        document.getElementById('kaloriSonuc').innerText = `🎉 Sonuç: ${netKalori} kcal`;
        document.getElementById('hizSonuc').innerText = hizKmSa.toFixed(2) + " km/s";
        document.getElementById('turSonuc').innerText = (hizKmSa < 8.0) ? "Yürüyüş" : "Koşu";
        
        const yuzde = Math.min((netKalori / hedef) * 100, 100);
        document.getElementById('bar').style.width = yuzde + "%";
        const yemekler = [{k: 100, i: "1 kupa kahve"}, {k: 300, i: "1 muz"}, {k: 500, i: "1 dilim pizza"}, {k: 800, i: "1 hamburger"}];
        document.getElementById('yiyecek').innerText = `Bu antrenmanla: ${yemekler.findLast(y => netKalori >= y.k)?.i || "Azimle devam!"} erittin!`;
        
        document.getElementById('resultBox').style.display = "block";
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
